name: Deploy Static Website

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - "templates/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Deploy Website
        env:
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          DEPLOYMENT_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh

      - name: Get CloudFront Distribution ID
        id: distribution
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ secrets.BUCKET_NAME }}.s3.amazonaws.com'].Id" \
            --output text)

          echo "distribution=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront Cache
        if: steps.distribution.outputs.distribution != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.distribution.outputs.distribution }} \
            --paths "/*"

      - name: Deployment Summary
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | ${{ secrets.BUCKET_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ vars.PROJECT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ vars.ENVIRONMENT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY