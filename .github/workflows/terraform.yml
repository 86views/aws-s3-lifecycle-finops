name: Terraform Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "*.tf"
      - "*.tfvars"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "*.tf"
      - "*.tfvars"
      - "modules/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (plan role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          role-session-name: github-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Access
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_environment: ${{ vars.ENVIRONMENT }}
          TF_VAR_project: ${{ vars.PROJECT }}
          TF_VAR_cost_center: ${{ vars.COST_CENTER }}
          TF_VAR_cloudfront_enabled: ${{ vars.CLOUDFRONT_ENABLED }}
        run: terraform plan -no-color -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production # requires a manual approval if you configure a reviewer on this GitHub Environment

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (apply role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          role-session-name: github-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name 2>/dev/null || echo 'not-set')" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo 'not-set')" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## ✅ Terraform Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bucket | ${{ steps.outputs.outputs.bucket_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront | ${{ steps.outputs.outputs.cloudfront_distribution_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | ${{ vars.PROJECT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ vars.ENVIRONMENT }} |" >> "$GITHUB_STEP_SUMMARY"