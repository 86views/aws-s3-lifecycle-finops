name: Terraform Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "*.tf"
      - "*.tfvars"
      - "modules/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevent infinite hanging

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug AWS Setup
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Access
        run: |
          echo "Testing AWS credentials..."
          aws sts get-caller-identity || exit 1
          echo "✅ AWS credentials working!"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Terraform Init
        run: |
          echo "Initializing Terraform..."
          terraform init || exit 1
          echo "✅ Init completed"

      - name: Terraform Validate
        run: |
          echo "Validating Terraform..."
          terraform validate || exit 1
          echo "✅ Validate completed"

      - name: Terraform Plan
        id: plan
        run: |
          echo "Planning Terraform changes..."
          terraform plan -no-color \
            -var="bucket_name=${{ secrets.BUCKET_NAME }}" \
            -var="environment=${{ vars.ENVIRONMENT }}" \
            -var="project=${{ vars.PROJECT }}" \
            -var="cost_center=${{ vars.COST_CENTER }}" \
            -var="cloudfront_enabled=${{ vars.CLOUDFRONT_ENABLED }}" \
            -out=tfplan
          echo "✅ Plan completed"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Applying Terraform changes..."
          terraform apply -auto-approve tfplan
          echo "✅ Apply completed"

      - name: Get Outputs
        id: outputs
        run: |
          echo "Getting Terraform outputs..."
          echo "bucket_name=$(terraform output -raw bucket_name 2>/dev/null || echo 'not-set')" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo 'not-set')" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## ✅ Terraform Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bucket | ${{ steps.outputs.outputs.bucket_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront | ${{ steps.outputs.outputs.cloudfront_distribution_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | ${{ vars.PROJECT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ vars.ENVIRONMENT }} |" >> "$GITHUB_STEP_SUMMARY"
