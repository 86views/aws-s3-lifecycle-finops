name: Terraform Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "*.tf"
      - "*.tfvars"
      - "modules/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    outputs:
      bucket_name: ${{ steps.outputs.outputs.bucket_name }}
      distribution_id: ${{ steps.outputs.outputs.cloudfront_distribution_id }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug GitHub Context
        run: |
          echo "Repository : ${{ github.repository }}"
          echo "Ref        : ${{ github.ref }}"
          echo "Actor      : ${{ github.actor }}"
          echo "Event      : ${{ github.event_name }}"

      - name: Sanity check secret length
        run: echo "Secret length: ${#ROLE_ARN}"
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

      - name: Debug OIDC token claims
        run: |
          JWT=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$JWT" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="bucket_name=${{ secrets.BUCKET_NAME }}" \
            -var="environment=${{ vars.ENVIRONMENT }}" \
            -var="project=${{ vars.PROJECT }}" \
            -var="cost_center=${{ vars.COST_CENTER }}" \
            -var="cloudfront_enabled=${{ vars.CLOUDFRONT_ENABLED }}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve \
            -var="bucket_name=${{ secrets.BUCKET_NAME }}" \
            -var="environment=${{ vars.ENVIRONMENT }}" \
            -var="project=${{ vars.PROJECT }}" \
            -var="cost_center=${{ vars.COST_CENTER }}" \
            -var="cloudfront_enabled=${{ vars.CLOUDFRONT_ENABLED }}"

      - name: Export Outputs
        id: outputs
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Terraform Summary
        run: |
          echo "## Terraform Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | $(terraform output -raw bucket_name) |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront | $(terraform output -raw cloudfront_distribution_id) |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ vars.PROJECT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ vars.ENVIRONMENT }} |" >> $GITHUB_STEP_SUMMARY