<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My FinOps Project - $${ENVIRONMENT}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: $${ENVIRONMENT == 'prod' ? '#10B981' : '#3B82F6'};
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1F2937;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #F3F4F6;
            padding: 8px 16px;
            border-radius: 8px;
            color: #059669;
            font-weight: 500;
            margin: 20px 0;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
            text-align: left;
        }
        .info-item {
            background: #F9FAFB;
            padding: 12px;
            border-radius: 8px;
        }
        .info-label {
            font-size: 11px;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .info-value {
            font-size: 14px;
            color: #1F2937;
            font-weight: 500;
            margin-top: 4px;
            word-break: break-all;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #E5E7EB;
            font-size: 12px;
            color: #6B7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">$${ENVIRONMENT}</div>
        <h1>🚀 FinOps Dashboard</h1>
        <p style="color: #6B7280; margin-bottom: 10px;">Deployed via GitHub Actions</p>
        
        <div class="status">
            <span class="status-dot"></span>
            Live & Operational
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Environment</div>
                <div class="info-value">$${ENVIRONMENT}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Deployment ID</div>
                <div class="info-value">$${DEPLOYMENT_ID}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Deployed</div>
                <div class="info-value">$${TIMESTAMP}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Version</div>
                <div class="info-value">v1.0.0</div>
            </div>
        </div>

        <div class="footer">
            Powered by Oluelye Oluseun Terraform & GitHub Actions • 2026
        </div>
    </div>
</body>
</html>
