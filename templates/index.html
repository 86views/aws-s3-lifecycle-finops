<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My FinOps Project - ${ENVIRONMENT}</title>
    <style>
        /* Your existing beautiful CSS remains the same */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: ${ENVIRONMENT == 'prod' ? '#10B981' : '#3B82F6'};
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        /* ... rest of your styles ... */
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">${ENVIRONMENT}</div>
        <h1>🚀 FinOps Dashboard</h1>
        <p style="color: #6B7280; margin-bottom: 10px;">Deployed via GitHub Actions</p>
        
        <div class="status">
            <span class="status-dot"></span>
            Live & Operational
        </div>
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Environment</div>
                <div class="info-value">${ENVIRONMENT}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Deployment ID</div>
                <div class="info-value">${DEPLOYMENT_ID}</div>
            </div>
            <div class="info-item">
                <div class="info-label">Deployed</div>
                <div class="info-value">${TIMESTAMP}</div>
            </div>
        </div>
        <div class="footer">
            Powered by Oluelye Oluseun • Terraform + GitHub Actions • 2026
        </div>
    </div>
</body>
</html><!-- Test deploy workflow - $(date) -->
